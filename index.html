<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Homeverse</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- TOP HEADER -->

    <div class="top-header">

        <div class="container top-header-wrapper">

            <div class="top-left">

                <div class="top-item">

                    <i class="fa-solid fa-envelope"></i>

                    <span>info@bootcamp.edu.com</span>

                </div>

                <div class="top-item">

                    <i class="fa-solid fa-location-dot"></i>

                    <span>15/A, Nest Tower, NYC</span>

                </div>

            </div>

            <div class="top-right">

                <div class="social-icons">

                    <i class="fa-brands fa-facebook-f"></i>
                    <i class="fa-brands fa-twitter"></i>
                    <i class="fa-brands fa-instagram"></i>
                    <i class="fa-brands fa-pinterest-p"></i>

                </div>

                <button class="listing-btn">

                    Add Listing

                </button>

            </div>

        </div>

    </div>

    <!-- HEADER -->

    <header class="header">

        <div class="container navbar">

            <!-- LOGO -->

            <div class="logo">

                <img src="./assets/images/anh1.png" alt="logo">

            </div>

            <!-- MENU -->

            <nav class="nav-menu">

                <div class="mobile-top">
                    <img src="./assets/images/anh1.png" alt="">
                    <i class="fa-solid fa-xmark"></i>
                </div>

                <a href="#">HOME</a>
                <a href="#">ABOUT</a>
                <a href="#">SERVICE</a>
                <a href="#">PROPERTY</a>
                <a href="#">BLOG</a>
                <a href="#">CONTACT</a>

            </nav>

            <!-- RIGHT -->

            <div class="nav-right">

                <div class="nav-icons">

                    <div class="icon-box">

                        <i class="fa-solid fa-magnifying-glass"></i>

                    </div>

                    <div class="icon-box">

                        <i class="fa-regular fa-user"></i>

                    </div>

                    <div class="icon-box">

                        <i class="fa-solid fa-cart-shopping"></i>

                    </div>

                </div>

                <!-- MOBILE -->

                <div class="menu-toggle">

                    <i class="fa-solid fa-bars"></i>

                </div>

            </div>

        </div>

    </header>

    <!-- HERO -->

    <section class="hero">

        <div class="container hero-wrapper">

            <!-- LEFT -->

            <div class="hero-content">

                <div class="hero-subtitle">

                    <img src="./assets/images/anh3.png" alt="">

                    <span>Real Estate Agency</span>

                </div>

                <h1>

                    Find Your Dream
                    House By Us

                </h1>

                <div class="hero-description">

                    <div class="hero-line"></div>

                    <p>

                        Lorem ipsum dolor sit amet consectetur adipisicing elit.
                        Sed do eiusmod tempor incididunt ut labore.

                    </p>

                </div>

                <button class="hero-btn">

                    Make An Enquiry

                </button>

            </div>

            <!-- RIGHT -->

            <div class="hero-image">

                <img src="assets/images/anh2.png" alt="house">

            </div>

        </div>

    </section>

    <!-- JS -->

    <script src="./jvscript/main.js"></script>

</body>

</html>
